<div class="listings-layout">
  
  <!-- Filter Sidebar -->
  <aside class="filter-panel">
    <h3 class="filter-title">Filters</h3>

    <!-- Search -->
    <div class="filter-group">
      <label class="filter-label">Search</label>
      <input type="text" class="form-control" placeholder="Search services..." 
             [ngModel]="search()" (ngModelChange)="updateSearch($event)">
    </div>

    <!-- Categories -->
    <div class="filter-group">
      <label class="filter-label">Category</label>
      <div class="filter-option" *ngFor="let cat of categories" 
           [class.active]="selectedCats()[cat]" 
           (click)="toggleCat(cat)">
        <input type="checkbox" [checked]="selectedCats()[cat]" readonly style="pointer-events: none;">
        <span>{{ cat }}</span>
      </div>
    </div>

    <!-- Price Filter -->
    <div class="filter-group">
      <label class="filter-label">Max Price / Hour</label>
      <input type="range" class="range-slider" min="300" max="3000" step="50" 
             [ngModel]="maxRate()" (ngModelChange)="updateMaxRate($event)">
      <div class="range-value">₱{{ maxRate() }}</div>
    </div>

    <!-- Rating Filter -->
    <div class="filter-group">
      <label class="filter-label">Minimum Rating</label>
      <div class="stars" style="cursor: pointer;">
        <span *ngFor="let s of [1,2,3,4,5]" class="star" 
              [class.filled]="s <= minRating()" 
              (click)="updateRating(s)">★</span>
      </div>
    </div>

    <!-- Verified Toggle -->
    <div class="filter-option" (click)="toggleVerified()">
      <input type="checkbox" [checked]="verifiedOnly()" readonly style="pointer-events: none;">
      <span>Verified Only</span>
    </div>

    <div class="divider"></div>
    <button class="btn btn-secondary btn-block" (click)="clearFilters()">Reset Filters</button>
  </aside>

  <!-- Main Results -->
  <main>
    <div class="listings-header">
      <span class="results-count">{{ filteredProviders().length }} services available</span>
      
      <select class="form-control" style="width: auto;" [ngModel]="sortBy()" (ngModelChange)="updateSort($event)">
        <option value="rating">Highest Rated</option>
        <option value="rate">Lowest Price</option>
        <option value="name">Name (A-Z)</option>
      </select>
    </div>

    <div class="listings-grid" *ngIf="filteredProviders().length > 0; else emptyState" @cardStagger>
      <div class="provider-card" *ngFor="let p of filteredProviders()" (click)="viewProvider(p)">
        <div class="provider-card-img">
          {{ p.name.charAt(0) }}
          <div class="verified-badge" *ngIf="p.verified">✓ Verified</div>
        </div>
        <div class="provider-card-body">
          <div class="provider-service">{{ p.service }}</div>
          <h3 class="provider-name">{{ p.name }}</h3>
          <div class="provider-meta">
            <div class="provider-rating">
              <span class="star filled">★</span> <span>{{ p.rating }}</span>
            </div>
            <div class="provider-rate">₱{{ p.rate }}<span>/hr</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <ng-template #emptyState>
      <div class="listings-empty">
        <div class="skeleton" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem;"></div>
        <h3>No services found</h3>
        <p class="section-sub">Try adjusting your search or filters to find what you're looking for.</p>
        <button class="btn btn-primary" (click)="clearFilters()">Clear Filters</button>
      </div>
    </ng-template>
  </main>
</div>
